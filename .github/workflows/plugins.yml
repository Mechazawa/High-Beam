# Per-plugin vitest matrix (one failure doesn't mask the rest). Add a plugin
# to the matrix below when it gains a package.json with tests.
name: Plugins

# Path-filtered: sdk/** is included because every plugin imports it.
on:
  push:
    branches: [master]
    paths:
      - 'plugins/**'
      - 'sdk/**'
      - '.github/workflows/plugins.yml'
  pull_request:
    branches: [master]
    paths:
      - 'plugins/**'
      - 'sdk/**'
      - '.github/workflows/plugins.yml'

concurrency:
  group: plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: vitest (${{ matrix.plugin }})
    # Node/vitest is platform-agnostic — no need for 10x-billed macOS.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        plugin:
          - app-launcher
          - calculator
          - clipboard-history
          - currency-converter
          - dnd
          - echo
          - echo-ts
          - emoji-picker
          - http-codes
          - obsidian
          - paper-size
          - xkcd

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Single workspace lockfile at plugins/ — vitest + typescript hoist
          # to the root, every plugin shares the install.
          cache: 'npm'
          cache-dependency-path: plugins/package-lock.json

      - name: npm ci (workspace root)
        working-directory: plugins
        run: npm ci

      - name: npm test
        working-directory: plugins
        run: npm test --workspace=${{ matrix.plugin }} --if-present
