# vitest for every default plugin that ships a package.json + test script.
# Matrix-per-plugin so a single failing plugin doesn't mask others, and
# runs go parallel.
#
# Plugin list is hardcoded — if a new plugin lands under `plugins/` with
# its own package.json, append it to the matrix below. `frecency-demo`
# and `slow-echo` are intentionally absent: they have no package.json
# (pure JS demos, no JS-side tests).
name: Plugins

on:
  push:
    branches: [master, rust]
  pull_request:
    branches: [master, rust]

concurrency:
  group: plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: vitest (${{ matrix.plugin }})
    runs-on: macos-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        plugin:
          - app-launcher
          - calculator
          - dnd
          - echo
          - echo-ts
          - http-codes
          - paper-size
          - xkcd

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Built-in npm cache, scoped to this plugin's lockfile so cache
          # hits don't span unrelated plugins.
          cache: 'npm'
          cache-dependency-path: plugins/${{ matrix.plugin }}/package-lock.json

      - name: npm ci
        working-directory: plugins/${{ matrix.plugin }}
        run: npm ci

      - name: npm test
        working-directory: plugins/${{ matrix.plugin }}
        run: npm test
